<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>RIOS</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./styles.css?v=27" />
  <link rel="stylesheet" href="./rios-electric-theme.css?v=27" />
  <link rel="stylesheet" href="./rios-modern-ui.css?v=27" />

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3b82f6">
  <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%233b82f6'/><stop offset='1' stop-color='%2322d3ee'/></linearGradient></defs><rect width='180' height='180' fill='url(%23g)' rx='36'/><text x='90' y='124' font-size='110' text-anchor='middle' fill='white' font-family='system-ui' font-weight='800'>R</text></svg>">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <script>
    // Anti-FOUC: apply dark theme immediately before any render
    (function() {
      try {
        var prefs = JSON.parse(localStorage.getItem('rios.prefs') || '{}');
        var mode = prefs?.theme?.mode || 'dark'; // default to dark
        document.documentElement.dataset.theme = mode;
        if (mode === 'dark') document.documentElement.classList.add('dark');
        // Apply saved colors if available
        if (prefs?.theme?.bg) document.documentElement.style.setProperty('--rios-bg', prefs.theme.bg);
        if (prefs?.theme?.surface) document.documentElement.style.setProperty('--rios-surface', prefs.theme.surface);
        if (prefs?.theme?.text) document.documentElement.style.setProperty('--rios-text', prefs.theme.text);
      } catch(e) {
        document.documentElement.dataset.theme = 'dark';
        document.documentElement.classList.add('dark');
      }
    })();

    // Service worker registration — never silently fail.
    // The error is captured on window.__RIOS_SW_ERROR__ for diagnostics,
    // and surfaced to the dev console when running on localhost.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('service-worker.js').catch(function (err) {
          var message = (err && err.message) ? err.message : String(err);
          window.__RIOS_SW_ERROR__ = message;
          try {
            var h = location.hostname;
            if (h === 'localhost' || h.indexOf('127.0.0.1') !== -1) {
              console.warn('[RIOS WARNING]', {
                level: 'warning',
                message: 'Service worker registration failed',
                context: { source: 'index.serviceWorker.register', error: message },
                time: new Date().toISOString(),
              });
            }
          } catch (_) { /* never throw from logger fallback */ }
        });
      });
    }
  </script>
</head>
<body>
  <div id="app" class="app">
    <div class="state" style="padding:2rem">Starting…</div>
  </div>

  <script src="./env.js"></script>
  <script type="module" src="./app.js"></script>
  <script src="./rios-theme-toggle.js?v=27"></script>
  <script src="./rios-modern-icons.js?v=27"></script>
  <script src="./rios-modern-pos.js?v=27"></script>
  <script src="./rios-modern-charts.js?v=27"></script>
</body>
</html>
